    function rowToList(r){ return { id:r.id, name:r.name, vendor:r.vendor, branch:r.branch, shared:r.shared, shareToken:r.share_token, sharedWith:r.shared_with||[], owner:r.owner_email, items:r.items||[] }; }

    async function dbLoad(sb, email){
      const { data, error } = await sb.from("lists").select("*").or(`owner_email.eq.${email},shared_with.cs.{${email}}`).order("created_at");
      if(error) throw error;
      return (data||[]).map(rowToList);
    }
    async function dbSave(sb, list){ const { error } = await sb.from("lists").upsert(listToRow(list),{onConflict:"id"}); if(error) throw error; }

    function EmailTagInput({ emails, onChange }) {
      const [input,setInput]=useState(""); const [error,setError]=useState(""); const MAX=5;
      function addEmail(raw){ const val=raw.trim().toLowerCase(); if(!val)return; if(!isValidEmail(val)){setError(`"${val}" אינה כתובת אימייל תקינה`);return;} if(emails.includes(val)){setError("אימייל זה כבר נוסף");return;} if(emails.length>=MAX){setError(`ניתן להוסיף עד ${MAX} כתובות בלבד`);return;} onChange([...emails,val]); setInput(""); setError(""); }
      function removeEmail(e){ onChange(emails.filter(x=>x!==e)); setError(""); }
      function handleKeyDown(e){ if(e.key==="Enter"||e.key===","||e.key===" "){e.preventDefault();addEmail(input);} if(e.key==="Backspace"&&!input&&emails.length>0)removeEmail(emails[emails.length-1]); }
      return (
        <div>
          <div style={{border:`2px solid ${error?T.danger:T.inputBorder}`,borderRadius:10,padding:"6px 10px",background:"#fff",minHeight:44,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",cursor:"text"}} onClick={e=>e.currentTarget.querySelector("input")?.focus()}>

              </span>
            ))}
            {emails.length<MAX&&<input value={input} onChange={e=>{setInput(e.target.value);setError("");}} onKeyDown={handleKeyDown} onBlur={()=>{ if(input.trim())addEmail(input); }} placeholder={emails.length===0?"wife@gmail.com":"+ הוסף אימייל"} style={{border:"none",outline:"none",fontSize:13,flex:1,minWidth:140,background:"transparent",color:T.textMain}} type="email"/>}
          </div>
          {error&&<div style={{fontSize:11,color:T.danger,marginTop:4}}>⚠️ {error}</div>}
          <div style={{fontSize:11,color:T.textMuted,marginTop:3}}>הקש Enter או פסיק להוספה · עד {MAX} כתובות</div>
        </div>
      );
    }

    function AdminPanel({ initialVendors, userToken, onClose, onVendorsUpdated }) {
      const [vendors,setVendors]=useState(()=>JSON.parse(JSON.stringify(initialVendors)));
      const [selectedId,setSelectedId]=useState(initialVendors[0]?.id||null);
      const [vendorForm,setVendorForm]=useState(null);
      const [branchForm,setBranchForm]=useState(null);
      const [delConfirm,setDelConfirm]=useState(null);
      const [saving,setSaving]=useState(false);
      const [saveStatus,setSaveStatus]=useState(null);
      const [saveError,setSaveError]=useState(null);
      const [hasChanges,setHasChanges]=useState(false);
      const selected=vendors.find(v=>v.id===selectedId);
      function mark(){ setHasChanges(true); setSaveStatus(null); setSaveError(null); }
      function addVendor(v)    { setVendors(vs=>[...vs,v]); setSelectedId(v.id); setVendorForm(null); mark(); }
      function updateVendor(v) { setVendors(vs=>vs.map(x=>x.id===v.id?{...x,...v}:x)); setVendorForm(null); mark(); }
      function toggleVendor(id){ setVendors(vs=>vs.map(v=>v.id===id?{...v,enabled:!v.enabled}:v)); mark(); }
      function deleteVendor(id){ setVendors(vs=>vs.filter(v=>v.id!==id)); setSelectedId(vendors.find(v=>v.id!==id)?.id||null); setDelConfirm(null); mark(); }
      function addBranch(b)    { setVendors(vs=>vs.map(v=>v.id!==selectedId?v:{...v,branches:[...v.branches,b]})); setBranchForm(null); mark(); }
      function updateBranch(b) { setVendors(vs=>vs.map(v=>v.id!==selectedId?v:{...v,branches:v.branches.map(x=>x.id===b.id?{...x,...b}:x)})); setBranchForm(null); mark(); }
      function toggleBranch(bid){ setVendors(vs=>vs.map(v=>v.id!==selectedId?v:{...v,branches:v.branches.map(b=>b.id===bid?{...b,enabled:!b.enabled}:b)})); mark(); }
      function deleteBranch(bid){ setVendors(vs=>vs.map(v=>v.id!==selectedId?v:{...v,branches:v.branches.filter(b=>b.id!==bid)})); setDelConfirm(null); mark(); }
      async function saveToKV(){
        setSaving(true); setSaveStatus(null); setSaveError(null);
        try{
          const res=await fetch(`${API}/admin/vendors`,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":`Bearer ${userToken}`},body:JSON.stringify(vendors)});
          if(!res.ok){
            const txt=await res.text().catch(()=>"");
            const msg=`${res.status}${txt?" – "+txt.slice(0,200):""}`;
            console.error("[CartWise] saveToKV failed:", msg);
            setSaveError(msg);
            throw new Error(msg);
          }
          setSaveStatus("ok"); setHasChanges(false); onVendorsUpdated(vendors);
          setTimeout(()=>setSaveStatus(null),3000);
        }catch(e){ setSaveStatus("err"); }
        finally{ setSaving(false); }

              {saveStatus==="err"&&<span title={saveError||""} style={{color:"#ff6b6b",fontSize:13,fontWeight:600,maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block",verticalAlign:"middle"}}>❌ שגיאה{saveError?` (${saveError})`:""}</span>}
              {hasChanges&&<button onClick={saveToKV} disabled={saving} style={{background:saving?"#888":"#2ecc71",color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",cursor:"pointer",fontWeight:700,fontSize:13}}>{saving?"שומר...":"💾 שמור שינויים"}</button>}
              <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontWeight:700,fontSize:14}}>✕ סגור</button>
            </div>
          </div>
          <div dir="rtl" style={{flex:1,display:"flex",overflow:"hidden",background:T.pageBg}}>
            <div style={{width:200,background:T.sidebarBg,borderLeft:`1px solid ${T.sidebarBorder}`,display:"flex",flexDirection:"column",flexShrink:0}}>
              <div style={{padding:"10px 10px 6px",fontWeight:700,fontSize:11,color:T.textSoft,textTransform:"uppercase",letterSpacing:0.5,borderBottom:`1px solid ${T.sidebarBorder}`}}>רשתות</div>
              <div style={{flex:1,overflowY:"auto"}}>
                {vendors.map(v=>(
                  <div key={v.id} onClick={()=>setSelectedId(v.id)} style={{padding:"9px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,background:selectedId===v.id?T.activeListBg:"transparent",borderRight:`3px solid ${selectedId===v.id?T.activeListBorder:"transparent"}`,opacity:v.enabled?1:0.45}}>
                    <span style={{fontSize:20}}>{v.logoUrl?<img src={v.logoUrl} alt="" style={{width:22,height:22,objectFit:"contain",verticalAlign:"middle"}}/>:v.logo}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:T.textMain,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.name}</div>
                      <div style={{fontSize:11,color:T.textSoft}}>{v.branches.filter(b=>b.enabled).length} סניפים</div>
                    </div>
                    {!v.enabled&&<span style={{fontSize:10,color:T.danger}}>●</span>}

                ))}
              </div>
              <div style={{padding:8,borderTop:`1px solid ${T.sidebarBorder}`}}>
                <button onClick={()=>setVendorForm({})} style={{width:"100%",background:"#fff",color:T.primary,border:`2px dashed ${T.accent}`,borderRadius:8,padding:8,cursor:"pointer",fontWeight:700,fontSize:12}}>+ הוסף רשת</button>
              </div>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {selected?(<>
                <div style={{background:"#fff",padding:"12px 16px",borderBottom:`1px solid ${T.cardBorder}`,display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:32}}>{selected.logoUrl?<img src={selected.logoUrl} alt="" style={{width:36,height:36,objectFit:"contain"}}/>:selected.logo}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:16,color:T.textMain}}>{selected.name}</div>
                    <div style={{fontSize:12,color:T.textSoft}}>Chain ID: <span style={{fontFamily:"monospace"}}>{selected.chainId||"—"}</span> · {selected.enabled?<span style={{color:T.success,fontWeight:600}}>● פעיל</span>:<span style={{color:T.danger,fontWeight:600}}>● מושבת</span>}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>toggleVendor(selected.id)} style={{...btnBase,background:selected.enabled?T.dangerBg:T.successBg,color:selected.enabled?T.danger:T.success,border:`1px solid ${selected.enabled?T.dangerBorder:T.successBorder}`}}>{selected.enabled?"השבת":"הפעל"}</button>
                    <button onClick={()=>setVendorForm(selected)} style={{...btnBase,background:T.primaryLight,color:T.primary,border:`1px solid ${T.accent}`}}>✏️ ערוך</button>
                    <button onClick={()=>setDelConfirm({type:"vendor",item:selected})} style={{...btnBase,background:T.dangerBg,color:T.danger,border:`1px solid ${T.dangerBorder}`}}>🗑️</button>

                </div>
                <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontWeight:700,fontSize:14,color:T.textMid}}>סניפים ({selected.branches.length})</div>
                    <button onClick={()=>setBranchForm({})} style={{background:T.primary,color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>+ הוסף סניף</button>
                  </div>
                  {selected.branches.length===0&&<div style={{textAlign:"center",padding:40,color:T.textMuted}}><div style={{fontSize:32,marginBottom:8}}>🏪</div><div>אין סניפים — לחץ "הוסף סניף"</div></div>}
                  {selected.branches.map(b=>(
                    <div key={b.id} style={{background:T.cardBg,border:`1px solid ${T.cardBorder}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"flex-start",gap:10,opacity:b.enabled?1:0.5}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                          <span style={{fontWeight:700,fontSize:14,color:T.textMain}}>{b.name}</span>
                          {b.scraperEnabled&&<span style={{background:"#e8f5e9",color:"#2e7d32",borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>🤖 סקראפר</span>}
                          {!b.enabled&&<span style={{background:T.dangerBg,color:T.danger,borderRadius:20,padding:"1px 8px",fontSize:10,fontWeight:700}}>מושבת</span>}
                        </div>
                        <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:T.textSoft}}>
                          {b.city&&<span>📍 {b.city}</span>}
                          {b.storeId&&<span>🔢 Store ID: <span style={{fontFamily:"monospace",fontWeight:600}}>{b.storeId}</span></span>}
                          {b.openingHours&&<span>🕐 {b.openingHours}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>toggleBranch(b.id)} style={{...btnBase,background:b.enabled?T.dangerBg:T.successBg,color:b.enabled?T.danger:T.success,border:`1px solid ${b.enabled?T.dangerBorder:T.successBorder}`,fontSize:11}}>{b.enabled?"השבת":"הפעל"}</button>
                        <button onClick={()=>setBranchForm(b)} style={{...btnBase,background:T.primaryLight,color:T.primary,border:`1px solid ${T.accent}`,fontSize:11}}>✏️</button>
                        <button onClick={()=>setDelConfirm({type:"branch",item:b})} style={{...btnBase,background:T.dangerBg,color:T.danger,border:`1px solid ${T.dangerBorder}`,fontSize:11}}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              </>):(
                <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:T.textMuted}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>🏪</div><div>בחר רשת מהרשימה</div></div></div>
              )}
            </div>
          </div>
          {vendorForm!==null&&<Sheet onClose={()=>setVendorForm(null)}><VendorFormContent initial={vendorForm.id?vendorForm:null} existingIds={vendors.map(v=>v.id)} onSave={v=>vendorForm.id?updateVendor(v):addVendor(v)} onCancel={()=>setVendorForm(null)}/></Sheet>}
          {branchForm!==null&&<Sheet onClose={()=>setBranchForm(null)}><BranchFormContent initial={branchForm.id?branchForm:null} existingIds={selected?.branches.map(b=>b.id)||[]} onSave={b=>branchForm.id?updateBranch(b):addBranch(b)} onCancel={()=>setBranchForm(null)}/></Sheet>}
          {delConfirm&&<ConfirmDialog title={delConfirm.type==="vendor"?"מחיקת רשת":"מחיקת סניף"} message={delConfirm.type==="vendor"?`האם למחוק את הרשת "${delConfirm.item.name}"?`:`האם למחוק את הסניף "${delConfirm.item.name}"?`} confirmLabel="מחק" confirmDanger onConfirm={()=>delConfirm.type==="vendor"?deleteVendor(delConfirm.item.id):deleteBranch(delConfirm.item.id)} onCancel={()=>setDelConfirm(null)}/>}
        </div>
      );
    }

    function ListSheet({ initial, onClose, onSave, user, vendors }) {
      const editing=!!initial;
      const [name,setName]=useState(initial?.name||"");
      const [vendor,setVendor]=useState(initial?.vendor||"");
      const [branch,setBranch]=useState(initial?.branch||"");
      const [emails,setEmails]=useState(initial?.sharedWith||[]);
      const [nameError,setNameError]=useState("");
      const activeVendors=(vendors||DEFAULT_VENDORS).filter(v=>v.enabled!==false&&v.branches?.some(b=>b.scraperEnabled&&b.enabled!==false));
      const branches=vendor?(activeVendors.find(v=>v.id===vendor)?.branches||[]).filter(b=>b.enabled!==false&&b.scraperEnabled):[];
      function handleSave(){
        if(!name.trim()){setNameError("נא להזין שם");return;}
        if(!vendor){setNameError("נא לבחור רשת");return;}
        if(!branch){setNameError("נא לבחור סניף");return;}
        onSave({name:name.trim(),vendor,branch,sharedWith:emails});
      }
      return (
        <Sheet onClose={onClose}>
          <div style={{fontWeight:700,fontSize:18,marginBottom:18,color:T.textMain}}>{editing?"✏️ עריכת רשימה":"✨ רשימה חדשה"}</div>
          {editing&&<div style={{fontSize:13,color:T.danger,background:T.dangerBg,border:`1px solid ${T.dangerBorder}`,borderRadius:8,padding:"8px 12px",marginBottom:14}}>⚠️ שינוי רשת יעדכן את כל המחירים ברשימה</div>}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <label style={labelStyle}>שם הרשימה *</label>
              <input value={name} onChange={e=>{setName(e.target.value);setNameError("");}} placeholder='לדוגמה: "קניות שבועיות"' style={{...inputStyle,borderColor:nameError?T.danger:T.inputBorder}} autoFocus/>
              {nameError&&<div style={{fontSize:11,color:T.danger,marginTop:4}}>⚠️ {nameError}</div>}
            </div>
            <div>
              <label style={labelStyle}>רשת *</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {activeVendors.map(v=>(
                  <button key={v.id} onClick={()=>{setVendor(v.id);setBranch("");}} style={{padding:"7px 13px",borderRadius:20,cursor:"pointer",fontSize:13,fontWeight:vendor===v.id?700:500,border:`2px solid ${vendor===v.id?T.primary:T.inputBorder}`,background:vendor===v.id?T.primaryLight:"#fff",color:vendor===v.id?T.primaryDark:T.textMid}}>
                    {v.logoUrl?<img src={v.logoUrl} alt="" style={{width:16,height:16,objectFit:"contain",verticalAlign:"middle",marginLeft:4}}/>:v.logo} {v.name}
                  </button>
                ))}
              </div>
            </div>
            {vendor&&<div><label style={labelStyle}>סניף *</label><select value={branch} onChange={e=>setBranch(e.target.value)} style={inputStyle}><option value="">-- בחר סניף --</option>{branches.map(b=><option key={b.id} value={b.id}>{b.name}{b.openingHours?` (${b.openingHours})`:""}</option>)}</select></div>}
            <div><label style={labelStyle}>שתף עם (עד 5 כתובות)</label><EmailTagInput emails={emails} onChange={setEmails}/></div>
            <button onClick={handleSave} style={{background:T.headerBg,color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:16,fontWeight:700,cursor:"pointer"}}>{editing?"שמור שינויים 🔄":"צור רשימה 🛒"}</button>
          </div>
        </Sheet>
      );
    }

    function GoogleLoginBtn({ onLogin }) {
      const ref=useRef();
      useEffect(()=>{
        if(!window.google)return;
        window.google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:resp=>{const p=JSON.parse(atob(resp.credential.split(".")[1]));onLogin({name:p.name,email:p.email,picture:p.picture,token:resp.credential});}});
        window.google.accounts.id.renderButton(ref.current,{theme:"outline",size:"medium",text:"signin_with",locale:"he"});
      },[]);
      return <div ref={ref}/>;
    }

    function App() {
      const [user,setUser]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('cartwise_user'))||null; }catch{ return null; } });
      const [googleReady,setGoogleReady]=useState(false);
      const [vendors,setVendors]=useState(DEFAULT_VENDORS);
      const [lists,setLists]=useState(loadLists);
      const [activeId,setActiveId]=useState(()=>loadLists()[0]?.id||null);
      const [showSidebar,setShowSidebar]=useState(false);
      const [showListSheet,setShowListSheet]=useState(false);
      const [editingList,setEditingList]=useState(null);
      const [showProfile,setShowProfile]=useState(false);
      const [showAdmin,setShowAdmin]=useState(false);
      const [deleteConfirm,setDeleteConfirm]=useState(null);
      const [searchQuery,setSearchQuery]=useState("");
      const [suggestions,setSuggestions]=useState([]);
      const [showSugg,setShowSugg]=useState(false);
      const [searching,setSearching]=useState(false);
      const [compareMode,setCompareMode]=useState(false);
      const [toast,setToast]=useState(null);
      const [manualForm,setManualForm]=useState(null);
      const [compareData,setCompareData]=useState({});
      const [compareLoading,setCompareLoading]=useState(false);
      const [metaCache,setMetaCache]=useState({});
      const searchTimeout=useRef();
      const sbRef=useRef(null);
      const syncTimeout=useRef();

      const isAdmin=user?.email===ADMIN_EMAIL;
      const activeList=lists.find(l=>l.id===activeId);
      const getVendor=(id)=>vendors.find(v=>v.id===id);
      const getBranch=(vId,bId)=>getVendor(vId)?.branches?.find(b=>b.id===bId);

      useEffect(()=>{
        const s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client"; s.async=true; s.onload=()=>setGoogleReady(true); document.head.appendChild(s);
        sbRef.current=initSB();
        if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
      },[]);
      useEffect(()=>{
        fetch(`${API}/vendors`).then(r=>r.ok?r.json():null).then(data=>{
          if(Array.isArray(data)&&data.length>0){
            // Merge: KV data takes priority, but add any new vendors from DEFAULT_VENDORS not yet in KV
            const kvIds=new Set(data.map(v=>v.id));
            const merged=[...data,...DEFAULT_VENDORS.filter(v=>!kvIds.has(v.id))];
            setVendors(merged);
          }
        }).catch(()=>{});
      },[]);
      useEffect(()=>{ persistLists(lists); },[lists]);
      // Fetch real comparison prices when compare mode is on
      useEffect(()=>{
        if(!compareMode){setCompareData({});return;}
        if(!activeList?.items?.length) return;
        setCompareLoading(true);
        const others=vendors
          .filter(v=>v.enabled!==false&&v.id!==activeList.vendor&&v.branches?.some(b=>b.scraperEnabled&&b.enabled!==false))
          .map(v=>({vendor:v.id,store:v.branches.find(b=>b.scraperEnabled&&b.enabled!==false)?.storeId}))
          .filter(v=>v.store);
        if(!others.length){setCompareLoading(false);return;}
        fetch(`${API}/compare`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({items:activeList.items.map(i=>({barcode:i.barcode})),vendors:others})})
          .then(r=>r.ok?r.json():null).then(d=>{if(d)setCompareData(d);}).catch(()=>{}).finally(()=>setCompareLoading(false));
      },[compareMode,activeId]);
      // Fetch meta (price freshness) for active vendor/store
      useEffect(()=>{
        if(!activeList) return;
        const key=`${activeList.vendor}:${activeList.branch}`;
        if(metaCache[key]) return;
        fetch(`${API}/meta?vendor=${activeList.vendor}&store=${activeList.branch}`)
          .then(r=>r.ok?r.json():null).then(m=>{if(m?.updatedAt)setMetaCache(c=>({...c,[key]:m}));}).catch(()=>{});
      },[activeList?.vendor,activeList?.branch]);
      useEffect(()=>{
        if(searchQuery.length<2){setSuggestions([]);setShowSugg(false);return;}
        clearTimeout(searchTimeout.current);
        searchTimeout.current=setTimeout(async()=>{
          setSearching(true);
          try{
            const v=activeList?.vendor||"shufersal",s=activeList?.branch||"144";
            const res=await fetch(`${API}/search?q=${encodeURIComponent(searchQuery)}&vendor=${v}&store=${s}`);
            if(!res.ok)throw new Error();
            const data=await res.json();
            setSuggestions(Array.isArray(data)?data:[]);
            setShowSugg(true);
          }catch{ setSuggestions(sampleSearch(searchQuery)); setShowSugg(true); }
          finally{ setSearching(false); }
        },400);
      },[searchQuery,activeList?.vendor,activeList?.branch]);

      function showToast(msg){ setToast(msg); setTimeout(()=>setToast(null),2500); }
      function toggleCheck(uid){ updateLists(ls=>{ const next=ls.map(l=>l.id!==activeId?l:{...l,items:l.items.map(i=>i.uid===uid?{...i,checked:!i.checked}:i)}); syncActiveList(next); return next; }); }
      function clearChecked(){ updateLists(ls=>{ const next=ls.map(l=>l.id!==activeId?l:{...l,items:l.items.filter(i=>!i.checked)}); syncActiveList(next); return next; }); }
      function ageLabel(updatedAt){ if(!updatedAt)return null; const h=Math.floor((Date.now()-new Date(updatedAt))/3600000); if(h<1)return"עודכן עכשיו"; if(h<24)return`עודכן לפני ${h}ש'`; const d=Math.floor(h/24); return d===1?"עודכן אתמול":`עודכן לפני ${d} ימים`; }
      function updateLists(fn){ setLists(ls=>{ const next=fn(ls); persistLists(next); return next; }); }
      async function handleLogin(u){
        setUser(u); localStorage.setItem('cartwise_user',JSON.stringify(u)); setShowProfile(false); showToast(`שלום, ${u.name.split(" ")[0]}! 👋`);
        if(sbRef.current){
          try{
            const dbLists=await dbLoad(sbRef.current, u.email);
            if(dbLists.length>0){ setLists(dbLists); persistLists(dbLists); setActiveId(dbLists[0].id); }
            else{
              // First login — push existing localStorage lists to DB
              const local=loadLists().map(l=>({...l,owner:l.owner||u.email}));
              if(local.length>0){ for(const l of local) await dbSave(sbRef.current,l).catch(()=>{}); setLists(local); }
            }
          }catch(e){ console.error("DB load failed",e); showToast("⚠️ לא ניתן לטעון מהענן — נטען מהמכשיר"); }
        }
      }
      function handleLogout(){ setUser(null); localStorage.removeItem('cartwise_user'); setShowProfile(false); setShowAdmin(false); setLists(loadLists()); setActiveId(loadLists()[0]?.id||null); }

      function saveList({name,vendor,branch,sharedWith}){
        let saved;
        if(editingList){
          saved={...editingList,name,vendor,branch,sharedWith,shared:sharedWith.length>0};
          updateLists(ls=>ls.map(l=>l.id===editingList.id?saved:l));
        }else{
          saved={id:"list"+Date.now(),name,vendor,branch,shared:sharedWith.length>0,shareToken:Math.random().toString(36).slice(2),sharedWith,items:[],owner:user?.email||"anonymous"};
          updateLists(ls=>[...ls,saved]); setActiveId(saved.id);
        }
        if(sbRef.current&&user) dbSave(sbRef.current,saved).catch(e=>console.error("DB save failed",e));
        setShowListSheet(false); setEditingList(null); setShowSidebar(false);
      }

      function copyToVendor(targetVendor){
        if(!activeList) return;
        const targetBranch=targetVendor.branches?.find(b=>b.scraperEnabled&&b.enabled!==false)||targetVendor.branches?.find(b=>b.enabled!==false);
        if(!targetBranch) return;
        const existing=lists.find(l=>l.vendor===targetVendor.id);
        if(existing){
          const existingNames=new Set(existing.items.map(i=>i.name));
          const newItems=activeList.items.filter(i=>!existingNames.has(i.name));
          const updated={...existing,items:[...existing.items,...newItems]};
          updateLists(ls=>ls.map(l=>l.id===existing.id?updated:l));
          if(sbRef.current&&user) dbSave(sbRef.current,updated).catch(()=>{});
          setActiveId(existing.id);
          showToast(`הועתק לרשימה ב${targetVendor.name} ✅`);
        }else{
          const newList={id:"list"+Date.now(),name:activeList.name+" – "+targetVendor.name,vendor:targetVendor.id,branch:targetBranch.id,shared:false,shareToken:Math.random().toString(36).slice(2),sharedWith:[],items:[...activeList.items],owner:user?.email||"anonymous"};
          updateLists(ls=>[...ls,newList]);
          setActiveId(newList.id);
          if(sbRef.current&&user) dbSave(sbRef.current,newList).catch(()=>{});
          showToast(`נוצרה רשימה חדשה ב${targetVendor.name} ✅`);
        }
        setCompareMode(false);
      }

      function executeDelete(list){
        const isOwner=!list.owner||list.owner===user?.email||list.owner==="anonymous";
        updateLists(ls=>ls.filter(l=>l.id!==list.id));
        showToast(isOwner?"הרשימה נמחקה":"הרשימה הוסרה מהתצוגה שלך");
        if(activeId===list.id)setActiveId(lists.find(l=>l.id!==list.id)?.id||null);
        setDeleteConfirm(null);
        if(sbRef.current&&user&&isOwner) dbDelete(sbRef.current,list.id).catch(e=>console.error("DB delete failed",e));
      }

      function syncActiveList(newLists){
        if(!sbRef.current||!user)return;
        clearTimeout(syncTimeout.current);
        syncTimeout.current=setTimeout(()=>{
          const l=newLists.find(x=>x.id===activeId);
          if(l) dbSave(sbRef.current,l).catch(e=>console.error("DB sync failed",e));
        },800);
      }
      function addItem(product){ updateLists(ls=>{ const next=ls.map(l=>{ if(l.id!==activeId||l.items.find(i=>i.barcode===product.barcode))return l; return{...l,items:[...l.items,{uid:Date.now().toString(),...product,qty:1}]}; }); syncActiveList(next); return next; }); setSearchQuery(""); setSuggestions([]); setShowSugg(false); }
      function addManualItem({name,price}){
        if(!name.trim()) return;
        const product={barcode:`manual-${Date.now()}`,name:name.trim(),company:"",price:parseFloat(price)||0,unit:"",quantity:"",unitQty:"",manual:true};
        addItem(product);
        setManualForm(null);
        if(price&&parseFloat(price)>0&&activeList){
          fetch(`${API}/product`,{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({vendor:activeList.vendor,store:activeList.branch,name:product.name,price:product.price})
          }).catch(()=>{});
        }
      }
      function removeItem(uid){ updateLists(ls=>{ const next=ls.map(l=>l.id!==activeId?l:{...l,items:l.items.filter(i=>i.uid!==uid)}); syncActiveList(next); return next; }); }
      function changeQty(uid,d){ updateLists(ls=>{ const next=ls.map(l=>l.id!==activeId?l:{...l,items:l.items.map(i=>i.uid===uid?{...i,qty:Math.max(1,i.qty+d)}:i)}); syncActiveList(next); return next; }); }
      function copyShareLink(){ navigator.clipboard?.writeText(`https://cartwise.app/shared/${activeList.shareToken}`); showToast("✅ הקישור הועתק!"); }

      const total=activeList?.items.reduce((s,i)=>s+i.price*i.qty,0)||0;

      const SidebarContent=()=>(
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.sidebarBg}}>

            <div style={{padding:"14px 12px",background:T.primaryLight,borderBottom:`1px solid ${T.sidebarBorder}`,display:"flex",alignItems:"center",gap:10}}>

              <button onClick={handleLogout} style={{background:"none",border:`1px solid ${T.dangerBorder}`,color:T.danger,borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}>יציאה</button>
            </div>

                      <span style={{fontSize:12,color:T.textMuted}}>·</span>
                      <span style={{fontSize:12,color:T.textMid,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:120}}>{getBranch(activeList.vendor,activeList.branch)?.name||"בחר סניף"}</span>

                            (activeList?.items||[]).forEach(item=>{const p=data[item.barcode];if(p!==undefined){t+=p*item.qty;found++;}else t+=item.price*item.qty;});

                  ):[...activeList.items].sort((a,b)=>(a.checked?1:0)-(b.checked?1:0)).map(item=>(
                    <div key={item.uid} style={{background:T.cardBg,borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,boxShadow:T.cardShadow,marginBottom:8,border:`1px solid ${item.checked?T.successBorder:T.cardBorder}`,opacity:item.checked?0.55:1,transition:"opacity .15s"}}>
                      <button onClick={()=>toggleCheck(item.uid)} title={item.checked?"בטל סימון":"סמן כנלקח"} style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${item.checked?T.success:T.inputBorder}`,background:item.checked?T.success:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff",fontSize:13,padding:0,transition:"all .15s"}}>
                        {item.checked?"✓":""}
                      </button>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:13,color:T.textMain,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textDecoration:item.checked?"line-through":"none"}}>{item.name}</div>
                        <div style={{fontSize:11,color:T.textSoft}}>{item.company}</div>
                        <div style={{fontSize:12,color:T.textMid,marginTop:1}}>₪{item.price?.toFixed(2)} ליחידה</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                        <button onClick={()=>changeQty(item.uid,-1)} style={qtyBtn}>−</button>
                        <span style={{fontWeight:700,minWidth:22,textAlign:"center",fontSize:14,color:T.textMain}}>{item.qty}</span>
                        <button onClick={()=>changeQty(item.uid,1)} style={qtyBtn}>+</button>
                      </div>
                      <div className="item-subtotal" style={{minWidth:54,textAlign:"left",flexShrink:0}}><div style={{fontWeight:700,fontSize:14,color:T.primary}}>₪{(item.price*item.qty).toFixed(2)}</div></div>
                      <button onClick={()=>removeItem(item.uid)} style={{background:T.dangerBg,border:`1px solid ${T.dangerBorder}`,borderRadius:8,cursor:"pointer",color:T.danger,fontSize:14,padding:"4px 7px",flexShrink:0}}>🗑️</button>
                    </div>
                  ))}
                  {activeList.items.some(i=>i.checked)&&(
                    <div style={{textAlign:"center",padding:"4px 0 8px"}}>
                      <button onClick={clearChecked} style={{background:"none",border:`1px solid ${T.inputBorder}`,borderRadius:20,padding:"5px 16px",cursor:"pointer",fontSize:12,color:T.textSoft,fontWeight:600}}>
                        🗑️ נקה מסומנים ({activeList.items.filter(i=>i.checked).length})
                      </button>
                    </div>
                  )}
                </div>

                <div style={{position:"sticky",bottom:0,background:"#fff",borderTop:`1px solid ${T.cardBorder}`,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:4,boxShadow:"0 -2px 8px rgba(30,58,95,0.07)"}}>
                  <div style={{fontSize:13,color:T.textSoft,fontWeight:500}}>{activeList.items.reduce((s,i)=>s+i.qty,0)} פריטים בסל</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13,color:T.textMid,fontWeight:500}}>סה״כ:</span>
                    <span style={{fontWeight:800,fontSize:20,color:T.totalColor}}>₪{total.toFixed(2)}</span>
                  </div>
                </div>
              </>):(
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:T.textMuted,gap:12}}>
                  <div style={{fontSize:48}}>🛒</div>
                  <div style={{fontWeight:600,fontSize:16,color:T.textSoft}}>אין רשימות עדיין</div>
                  <button onClick={()=>setShowListSheet(true)} style={{background:T.headerBg,color:"#fff",border:"none",borderRadius:10,padding:"10px 22px",cursor:"pointer",fontWeight:600,fontSize:14}}>+ צור רשימה ראשונה</button>
                </div>
              )}
            </div>
          </div>

          {showAdmin&&isAdmin&&<AdminPanel initialVendors={vendors} userToken={user?.token} onClose={()=>setShowAdmin(false)} onVendorsUpdated={v=>setVendors(v)}/>}
          {showListSheet&&<ListSheet initial={editingList} onClose={()=>{setShowListSheet(false);setEditingList(null);}} onSave={saveList} user={user} vendors={vendors}/>}
          {deleteConfirm&&<ConfirmDialog title="מחיקת רשימה" message={`האם למחוק את הרשימה "${deleteConfirm.name}"?`} confirmLabel="מחק" confirmDanger onConfirm={()=>executeDelete(deleteConfirm)} onCancel={()=>setDeleteConfirm(null)}/>}
          {toast&&<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:T.primaryDark,color:"#fff",padding:"10px 20px",borderRadius:10,fontWeight:600,fontSize:14,zIndex:999,whiteSpace:"nowrap"}}>{toast}</div>}
          <style>{`
            .dsk-sidebar{display:none!important}
            @media(min-width:768px){
              .dsk-sidebar{display:flex!important}
              .mob-only{display:none!important}
              .item-subtotal{display:block!important}
            }
            @media(max-width:767px){
              .item-subtotal{display:none!important}
              .cmp-full{display:none!important}
              .cmp-icon{display:inline!important}
            }
            @media(min-width:768px){
              .cmp-full{display:inline!important}
              .cmp-icon{display:none!important}
            }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
